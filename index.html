<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swing Paint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #00050a; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }

    /* ── 모드 버튼 패널 ──────────────────────────────────────── */
    #mode-panel {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      pointer-events: auto;
      user-select: none;
      z-index: 10;
    }
    .mode-btn {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,5,10,0.55);
      color: rgba(255,255,255,0.30);
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: color 0.18s, border-color 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mode-btn:hover   { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.18); }
    .mode-btn.mode-on { color: #00ddff; border-color: #00ddff; box-shadow: 0 0 12px #00ddff44; }

    /* ── 속도 슬라이더 패널 ──────────────────────────────────── */
    #speed-panel {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 11px;
      background: rgba(0,5,10,0.55);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 30px;
      padding: 9px 22px;
      backdrop-filter: blur(10px);
      pointer-events: auto;
      user-select: none;
      z-index: 10;
    }
    .speed-label {
      font-family: 'Courier New', monospace;
      font-size: 8px;
      letter-spacing: 0.10em;
      color: rgba(255,255,255,0.22);
      white-space: nowrap;
    }
    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 130px;
      height: 2px;
      background: rgba(255,255,255,0.10);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      position: relative;
    }
    /* 중간 눈금 — pseudo로 표현 어려우므로 래퍼에서 처리 */
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00ddff;
      cursor: pointer;
      box-shadow: 0 0 8px #00ddff99, 0 0 2px #fff;
      transition: box-shadow 0.15s;
    }
    #speed-slider:active::-webkit-slider-thumb {
      box-shadow: 0 0 14px #00ddffcc, 0 0 3px #fff;
    }
    #speed-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      background: #00ddff;
      cursor: pointer;
      box-shadow: 0 0 8px #00ddff99;
    }
    #speed-slider::-moz-range-track {
      height: 2px;
      background: rgba(255,255,255,0.10);
      border-radius: 2px;
    }
    /* 슬라이더 중앙 눈금 마커 래퍼 */
    #speed-track-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    #speed-track-wrap::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 7px;
      background: rgba(0, 221, 255, 0.30);
      pointer-events: none;
    }

    /* ── 에너지 바 (화면 최하단) ─────────────────────────────── */
    #energy-wrap {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    #energy-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #0055ff, #00ddff);
      transition: background 0.4s;
    }
    #energy-wrap.low #energy-fill {
      background: linear-gradient(90deg, #ff2200, #ff6600);
      animation: pulse-energy 0.5s ease-in-out infinite alternate;
    }
    @keyframes pulse-energy {
      from { opacity: 0.5; } to { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- 모드 버튼 -->
  <div id="mode-panel">
    <button class="mode-btn" id="btn-mirror">MIRROR</button>
    <button class="mode-btn" id="btn-style">GLOW</button>
    <button class="mode-btn" id="btn-hud">HUD</button>
  </div>

  <!-- 속도 슬라이더 -->
  <div id="speed-panel">
    <span class="speed-label">SLOW</span>
    <div id="speed-track-wrap">
      <input type="range" id="speed-slider" min="0" max="100" value="50" />
    </div>
    <span class="speed-label">FAST</span>
  </div>

  <!-- 에너지 바 -->
  <div id="energy-wrap"><div id="energy-fill"></div></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
