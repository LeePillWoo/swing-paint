<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swing Paint</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #00050a; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }

    /* ── 시계 네온 컬러 사이클 ─────────────────────────────────── */
    @keyframes neon-cycle {
      0%     { color: rgba(  0,200,255,0.88); text-shadow: 0 0 8px rgba(  0,200,255,1.0), 0 0 20px rgba(  0,200,255,0.5), 0 0 44px rgba(  0,200,255,0.18); }
      12.5%  { color: rgba(200,  0,255,0.88); text-shadow: 0 0 8px rgba(200,  0,255,1.0), 0 0 20px rgba(200,  0,255,0.5), 0 0 44px rgba(200,  0,255,0.18); }
      25%    { color: rgba(255, 20,147,0.88); text-shadow: 0 0 8px rgba(255, 20,147,1.0), 0 0 20px rgba(255, 20,147,0.5), 0 0 44px rgba(255, 20,147,0.18); }
      37.5%  { color: rgba( 57,255,183,0.88); text-shadow: 0 0 8px rgba( 57,255,183,1.0), 0 0 20px rgba( 57,255,183,0.5), 0 0 44px rgba( 57,255,183,0.18); }
      50%    { color: rgba(255,100,  0,0.88); text-shadow: 0 0 8px rgba(255,100,  0,1.0), 0 0 20px rgba(255,100,  0,0.5), 0 0 44px rgba(255,100,  0,0.18); }
      62.5%  { color: rgba(100,255, 50,0.88); text-shadow: 0 0 8px rgba(100,255, 50,1.0), 0 0 20px rgba(100,255, 50,0.5), 0 0 44px rgba(100,255, 50,0.18); }
      75%    { color: rgba(255, 20, 60,0.88); text-shadow: 0 0 8px rgba(255, 20, 60,1.0), 0 0 20px rgba(255, 20, 60,0.5), 0 0 44px rgba(255, 20, 60,0.18); }
      87.5%  { color: rgba(  0, 80,255,0.88); text-shadow: 0 0 8px rgba(  0, 80,255,1.0), 0 0 20px rgba(  0, 80,255,0.5), 0 0 44px rgba(  0, 80,255,0.18); }
      100%   { color: rgba(  0,200,255,0.88); text-shadow: 0 0 8px rgba(  0,200,255,1.0), 0 0 20px rgba(  0,200,255,0.5), 0 0 44px rgba(  0,200,255,0.18); }
    }
    @keyframes divider-cycle {
      0%     { box-shadow: 0 0 5px rgba(  0,200,255,0.8); }
      12.5%  { box-shadow: 0 0 5px rgba(200,  0,255,0.8); }
      25%    { box-shadow: 0 0 5px rgba(255, 20,147,0.8); }
      37.5%  { box-shadow: 0 0 5px rgba( 57,255,183,0.8); }
      50%    { box-shadow: 0 0 5px rgba(255,100,  0,0.8); }
      62.5%  { box-shadow: 0 0 5px rgba(100,255, 50,0.8); }
      75%    { box-shadow: 0 0 5px rgba(255, 20, 60,0.8); }
      87.5%  { box-shadow: 0 0 5px rgba(  0, 80,255,0.8); }
      100%   { box-shadow: 0 0 5px rgba(  0,200,255,0.8); }
    }
    @keyframes pulse-energy {
      from { opacity: 0.5; } to { opacity: 1; }
    }

    /* ── 시계 디스플레이 ──────────────────────────────────────── */
    #clock-display {
      position: fixed;
      top: 18px; left: 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
      z-index: 5;
    }
    #clock-time {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-weight: 300;
      font-size: clamp(22px, 2.2vw, 52px);
      letter-spacing: 0.08em;
      line-height: 1;
      animation: neon-cycle 72s ease-in-out infinite;
    }
    #clock-time .sep { display: inline-block; animation: blink-sep 1s step-end infinite; }
    @keyframes blink-sep { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    #clock-divider {
      width: 100%; height: 1px;
      background: rgba(255,255,255,0.12);
      animation: divider-cycle 72s ease-in-out infinite;
    }
    #clock-date {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-weight: 300;
      font-size: clamp(9px, 0.85vw, 20px);
      letter-spacing: 0.16em; opacity: 0.55;
      animation: neon-cycle 72s ease-in-out infinite;
    }

    /* ── 패널 베이스 ──────────────────────────────────────────── */
    .ui-panel {
      position: fixed;
      background: rgba(0, 5, 14, 0.65);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      pointer-events: auto;
      user-select: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .panel-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ── HUD 토글 (우측 상단) ────────────────────────────────── */
    #hud-toggle {
      top: 16px; right: 16px;
      flex-direction: row;
      padding: 5px 8px;
    }

    /* ── ENV + MASS 패널 (좌측 하단) ─────────────────────────── */
    #env-panel {
      bottom: 22px; left: 16px; width: 108px;
      justify-content: space-between;
    }

    /* ── STYLE 패널 (우측 하단) ──────────────────────────────── */
    #style-panel {
      bottom: 22px; right: 16px; width: 108px;
      justify-content: space-between;
    }

    /* ── 슬라이더 패널 (하단 중앙) ───────────────────────────── */
    #slider-panel {
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      gap: 12px;
      justify-content: space-between;
    }

    /* ── 패널 내 버튼 전체 폭 고정 ───────────────────────────── */
    #env-panel .mode-btn,
    #style-panel .mode-btn { width: 100%; text-align: center; }

    /* ── 버튼 베이스 ─────────────────────────────────────────── */
    .mode-btn {
      font-family: 'Courier New', monospace;
      font-size: 8px;
      font-style: normal;
      font-weight: 400;
      letter-spacing: 0.10em;
      padding: 4px 7px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,5,10,0.50);
      color: rgba(255,255,255,0.28);
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s, box-shadow 0.18s, background 0.18s;
      touch-action: manipulation;
      white-space: nowrap;
      outline: none;
    }
    .mode-btn:hover { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.18); }

    /* ── ENV 버튼 (CHAOS / EARTH / SPACE / WATER) ───────────── */
    .env-btn.chaos {
      color: #cc55ff;
      border-color: rgba(204,85,255,0.42);
      box-shadow: 0 0 8px rgba(204,85,255,0.18), inset 0 0 12px rgba(204,85,255,0.06);
    }
    .env-btn.chaos:hover { box-shadow: 0 0 14px rgba(204,85,255,0.38); }

    .env-btn.earth {
      color: #3dcc70;
      border-color: rgba(61,204,112,0.38);
      box-shadow: 0 0 8px rgba(61,204,112,0.12), inset 0 0 12px rgba(61,204,112,0.04);
    }
    .env-btn.earth:hover { box-shadow: 0 0 14px rgba(61,204,112,0.28); }

    .env-btn.space {
      color: #7788ff;
      border-color: rgba(119,136,255,0.38);
      box-shadow: 0 0 8px rgba(119,136,255,0.12), inset 0 0 12px rgba(119,136,255,0.04);
    }
    .env-btn.space:hover { box-shadow: 0 0 14px rgba(119,136,255,0.28); }

    .env-btn.water {
      color: #00ccdd;
      border-color: rgba(0,204,221,0.38);
      box-shadow: 0 0 8px rgba(0,204,221,0.12), inset 0 0 12px rgba(0,204,221,0.04);
    }
    .env-btn.water:hover { box-shadow: 0 0 14px rgba(0,204,221,0.28); }

    /* ── SCALE 버튼 (PENTA / BLUES / MUTE) ──────────────────── */
    .scale-btn.penta { color: #00ccbb; border-color: rgba(  0,204,187,0.32); }
    .scale-btn.blues { color: #ff9944; border-color: rgba(255,153, 68,0.32); box-shadow: 0 0 7px rgba(255,153,68,0.14); }
    .scale-btn.mute  { color: rgba(255,255,255,0.20); border-color: rgba(255,255,255,0.08); }

    /* ── PRESET 버튼 ─────────────────────────────────────────── */
    .preset-btn {
      color: rgba(255, 215, 80, 0.38);
      border-color: rgba(255, 215, 80, 0.15);
    }
    .preset-btn:hover {
      color: rgba(255, 215, 80, 0.70);
      border-color: rgba(255, 215, 80, 0.32);
      box-shadow: 0 0 10px rgba(255, 215, 80, 0.18);
    }

    /* ── MASS 버튼 (STANDARD / IRON / FEATHER) ──────────────── */
    .mass-btn.standard {
      color: #88aacc;
      border-color: rgba(136,170,204,0.30);
    }
    .mass-btn.iron {
      color: #b0bec8;
      border-color: rgba(176,190,200,0.42);
    }
    .mass-btn.feather {
      color: #ffe070;
      border-color: rgba(255,224,112,0.28);
    }

    /* ── MIRROR 버튼 ─────────────────────────────────────────── */
    .mirror-btn {
      color: rgba(200,180,255,0.32);
      border-color: rgba(200,180,255,0.12);
    }
    .mirror-btn.mode-on {
      color: #dd44ff;
      border-color: #dd44ff;
      box-shadow: 0 0 12px rgba(221,68,255,0.30);
      background: linear-gradient(135deg, rgba(0,221,255,0.06), rgba(221,68,255,0.10));
    }

    /* ── TRAIL STYLE 버튼 (GLOW / LINE / COMET) ─────────────── */
    .trail-btn.glow {
      color: #ff9944;
      border-color: rgba(255,153,68,0.38);
      box-shadow: 0 0 8px rgba(255,153,68,0.14);
    }
    .trail-btn.line {
      color: #44aaff;
      border-color: rgba(68,170,255,0.38);
    }
    .trail-btn.comet {
      color: #bb88ff;
      border-color: rgba(187,136,255,0.38);
      box-shadow: 0 0 8px rgba(187,136,255,0.12);
    }
    .trail-btn.ribbon {
      color: #cc66ff;
      border-color: rgba(204,102,255,0.38);
      box-shadow: 0 0 8px rgba(204,102,255,0.14);
    }
    .trail-btn.spark {
      color: #ffdd55;
      border-color: rgba(255,221,85,0.38);
      box-shadow: 0 0 8px rgba(255,221,85,0.14);
    }

    /* ── HUD 버튼 ────────────────────────────────────────────── */
    #btn-hud { border-radius: 7px; padding: 4px 10px; font-size: 8px; letter-spacing: 0.14em; }
    #btn-hud.mode-on { color: #00ddff; border-color: #00ddff; box-shadow: 0 0 10px rgba(0,221,255,0.25); }

    /* ── 슬라이더 행 ─────────────────────────────────────────── */
    .slider-row { gap: 8px; justify-content: center; align-items: center; }
    .slide-label {
      font-family: 'Courier New', monospace;
      font-size: 7.5px;
      letter-spacing: 0.10em;
      color: rgba(255,255,255,0.22);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 32px;
    }
    .slider-row .slide-label:first-child { text-align: right; }
    .slider-row .slide-label:last-child  { text-align: left; }
    .slider-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex: none;
    }
    .slider-wrap::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 1px; height: 7px;
      background: rgba(0,221,255,0.22);
      pointer-events: none;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 110px; height: 2px;
      background: rgba(255,255,255,0.10);
      border-radius: 2px;
      outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #00ddff;
      cursor: pointer;
      box-shadow: 0 0 8px #00ddff99;
      transition: box-shadow 0.15s;
    }
    input[type=range]:active::-webkit-slider-thumb { box-shadow: 0 0 14px #00ddffcc; }
    input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%; border: none;
      background: #00ddff;
      cursor: pointer; box-shadow: 0 0 8px #00ddff99;
    }
    input[type=range]::-moz-range-track {
      height: 2px; background: rgba(255,255,255,0.10); border-radius: 2px;
    }

    /* ── 에너지 바 ───────────────────────────────────────────── */
    #energy-wrap {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
      z-index: 10;
    }
    #energy-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #0055ff, #00ddff);
      transition: background 0.4s;
    }
    #energy-wrap.low #energy-fill {
      background: linear-gradient(90deg, #ff2200, #ff6600);
      animation: pulse-energy 0.5s ease-in-out infinite alternate;
    }

    /* ── 소형 세로 모바일 (480px 이하 portrait) ─────────────── */
    @media (max-width: 480px) and (orientation: portrait) {
      #env-panel, #style-panel { width: 88px; }
      .mode-btn { font-size: 7px; padding: 3px 6px; }
      input[type=range] { width: 82px; }
    }

    /* ── 가로 화면 버튼 1열 (landscape 600px~1199px) ─────────
       슬라이더는 겹침 방지를 위해 600px~999px에서는 2행 유지,
       1000px 이상부터 1행으로 전환                            */
    @media (orientation: landscape) and (min-width: 600px) and (max-width: 1199px) {
      #env-panel,
      #style-panel {
        flex-direction: row;
        width: auto;
        justify-content: center;
        gap: 6px;
      }
      #env-panel .mode-btn,
      #style-panel .mode-btn { width: auto; }
    }
    @media (orientation: landscape) and (min-width: 1000px) and (max-width: 1199px) {
      #slider-panel {
        flex-direction: row;
        gap: 10px;
        align-items: center;
      }
    }

    /* ── 와이드 데스크탑 (1200px+): 왼쪽 사이드바 6행 컬럼 ── */
    @media (min-width: 1200px) {
      #ui-bar {
        position: fixed;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 10;
        pointer-events: none;
      }
      /* 자식 패널들: fixed 해제 → bar 내 흐름으로 */
      #env-panel,
      #slider-panel,
      #style-panel {
        position: static;
        width: 158px;
        flex-direction: column;
        justify-content: space-between;
        transform: none;
        pointer-events: auto;
      }
      #env-panel .mode-btn,
      #style-panel .mode-btn { width: 100%; }
      /* 슬라이더 패널: column, 레이블이 패널 안에 들어오도록 크기 조정 */
      #slider-panel {
        flex-direction: column;
        gap: 10px;
        padding: 10px 10px;
      }
      #slider-panel .slide-label {
        min-width: 22px;
        font-size: 6.5px;
      }
      #slider-panel input[type=range] { width: 82px; }
    }
  </style>
</head>
<body>

  <!-- 시계 디스플레이 -->
  <div id="clock-display">
    <div id="clock-time">
      <span id="ct-hh">00</span><span class="sep">:</span><span id="ct-mm">00</span><span class="sep">:</span><span id="ct-ss">00</span>
    </div>
    <div id="clock-divider"></div>
    <div id="clock-date">MON&nbsp;&nbsp;2026.01.01</div>
  </div>

  <!-- HUD 토글 (우측 상단) -->
  <div id="hud-toggle" class="ui-panel">
    <button class="mode-btn" id="btn-hud">HUD</button>
  </div>

  <!-- 하단 UI 바 (기본: fixed 3분할 / 와이드: 왼쪽 사이드바) -->
  <div id="ui-bar">

    <!-- ENV + MASS (좌측 하단) -->
    <div id="env-panel" class="ui-panel">
      <button class="mode-btn env-btn chaos" id="btn-env">CHAOS</button>
      <button class="mode-btn mass-btn standard" id="btn-mass">STANDARD</button>
      <button class="mode-btn preset-btn" id="btn-preset">DEFAULT</button>
    </div>

    <!-- 슬라이더 (하단 중앙) -->
    <div id="slider-panel" class="ui-panel">
      <div class="panel-row slider-row">
        <span class="slide-label">SLOW</span>
        <div class="slider-wrap">
          <input type="range" id="speed-slider" min="0" max="100" value="50" />
        </div>
        <span class="slide-label">FAST</span>
      </div>
      <div class="panel-row slider-row">
        <span class="slide-label">SHORT</span>
        <div class="slider-wrap">
          <input type="range" id="trail-slider" min="0" max="100" step="2" value="50" />
        </div>
        <span class="slide-label">LONG</span>
      </div>
    </div>

    <!-- MIRROR + STYLE (우측 하단) -->
    <div id="style-panel" class="ui-panel">
      <button class="mode-btn mirror-btn" id="btn-mirror">MIRROR</button>
      <button class="mode-btn trail-btn glow" id="btn-style">GLOW</button>
      <button class="mode-btn scale-btn penta" id="btn-scale">PENTA</button>
    </div>

  </div>

  <!-- 에너지 바 -->
  <div id="energy-wrap"><div id="energy-fill"></div></div>

  <script>
    (function () {
      const DAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      const elHH   = document.getElementById('ct-hh');
      const elMM   = document.getElementById('ct-mm');
      const elSS   = document.getElementById('ct-ss');
      const elDate = document.getElementById('clock-date');

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        const now = new Date();
        elHH.textContent = pad(now.getHours());
        elMM.textContent = pad(now.getMinutes());
        elSS.textContent = pad(now.getSeconds());

        const dy = DAYS[now.getDay()];
        const yr = now.getFullYear();
        const mo = pad(now.getMonth() + 1);
        const da = pad(now.getDate());
        elDate.textContent = `${dy}\u00a0\u00a0${yr}.${mo}.${da}`;
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
