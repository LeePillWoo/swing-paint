<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swing Paint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #00050a; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }

    #ui-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(0,5,10,0.65);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 40px;
      padding: 10px 28px;
      backdrop-filter: blur(10px);
      pointer-events: none;
      user-select: none;
    }
    .pill {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 5px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.22);
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .pill.flash-tap     { color:#ff1493; border-color:#ff1493; box-shadow:0 0 14px #ff149366; }
    .pill.active-charge { color:#ffaa00; border-color:#ffaa00; box-shadow:0 0 14px #ffaa0066; }
    .sep { width:1px; height:14px; background:rgba(255,255,255,0.09); }
    #charge-wrap {
      width:64px; height:3px;
      background:rgba(255,255,255,0.08);
      border-radius:2px; overflow:hidden;
      opacity:0; transition:opacity 0.2s;
    }
    #charge-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg,#ff6600,#ffee00);
      border-radius:2px;
    }
  </style>
</head>
<body>
  <div id="ui-panel">
    <div class="pill" id="pill-tap">TAP</div>
    <div class="sep"></div>
    <div class="pill" id="pill-charge">CHARGE</div>
    <div id="charge-wrap"><div id="charge-fill"></div></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script>
  new p5(function(p) {

    // ── 물리 상수 ─────────────────────────────────────────────────────────────
    //
    //  ▸ G = 9.81 이면 이 화면 스케일(L1≈200px)에서 진자 주기 ≈ 36초 → 너무 느림
    //  ▸ G = 1200 으로 올리면 주기 ≈ 1.2초 → 시원한 속도감
    //  ▸ 수치 안정성을 위해 프레임당 SUBSTEPS 번 작은 DT로 적분
    //
    const G        = 1200;   // 시각적 중력 (실제 단위 무관, 속도감 조정용)
    const DT       = 0.016;  // 적분 타임스텝 (초)
    const SUBSTEPS = 3;      // 프레임당 물리 스텝 수 (안정성)
    const M1 = 10, M2 = 10;

    let L1, L2, cx, cy;
    let a1, a2, a1v, a2v;

    // ── 잔상 ─────────────────────────────────────────────────────────────────
    const TRAIL_MAX  = 2400;
    const TRAIL_FADE = 0.0014;
    let trail = [];   // { x, y, alpha, r, g, b, w }

    // ── 색상 ─────────────────────────────────────────────────────────────────
    const PINK = [255,  20, 147];
    const MINT = [ 57, 255, 183];
    const GOLD = [255, 170,   0];
    const BG   = [  0,   5,  10];

    let colorPhase = 0;

    // ── 파동 링 ──────────────────────────────────────────────────────────────
    let rings = [];

    // ── 클릭 파티클 ──────────────────────────────────────────────────────────
    let particles = [];

    // ── 인터랙션 ─────────────────────────────────────────────────────────────
    let mode        = 'idle';   // 'idle' | 'charging'
    let pressTime   = 0;
    let chargeLevel = 0;
    let timeScale   = 1.0;

    // ── 오디오 ───────────────────────────────────────────────────────────────
    let audioCtx   = null;
    let chargeOsc  = null;
    let chargeGain = null;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function soundTap(pitch) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(pitch, t);
      o.frequency.exponentialRampToValueAtTime(pitch * 0.45, t + 0.2);
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + 0.26);
    }

    function soundChargeStart() {
      if (!audioCtx) return;
      if (chargeOsc) { try { chargeOsc.stop(); } catch(e){} chargeOsc = null; }
      const t = audioCtx.currentTime;
      chargeOsc  = audioCtx.createOscillator();
      chargeGain = audioCtx.createGain();
      chargeOsc.type = 'sawtooth';
      chargeOsc.frequency.setValueAtTime(55, t);
      chargeGain.gain.setValueAtTime(0, t);
      chargeGain.gain.linearRampToValueAtTime(0.11, t + 0.25);
      chargeOsc.connect(chargeGain);
      chargeGain.connect(audioCtx.destination);
      chargeOsc.start(t);
    }

    function soundChargeUpdate(lvl) {
      if (!chargeOsc) return;
      chargeOsc.frequency.setValueAtTime(55 + lvl * 240, audioCtx.currentTime);
    }

    function soundChargeRelease() {
      if (chargeOsc) {
        const t = audioCtx.currentTime;
        chargeGain.gain.setValueAtTime(chargeGain.gain.value, t);
        chargeGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        try { chargeOsc.stop(t + 0.18); } catch(e){}
        chargeOsc = null; chargeGain = null;
      }
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(360, t);
      o.frequency.exponentialRampToValueAtTime(50, t + 0.55);
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + 0.6);
    }

    // ── 물리 헬퍼 ────────────────────────────────────────────────────────────
    function getPos() {
      const x1 = cx + L1 * Math.sin(a1);
      const y1 = cy + L1 * Math.cos(a1);
      const x2 = x1 + L2 * Math.sin(a2);
      const y2 = y1 + L2 * Math.cos(a2);
      return { x1, y1, x2, y2 };
    }

    // 라그랑지안 4차 룽게-쿠타 적분 (Euler보다 수치 안정성 우수)
    function derivatives(s1, s1v, s2, s2v) {
      const sd  = Math.sin(s1 - s2);
      const cd  = Math.cos(s1 - s2);
      const den = 2*M1 + M2 - M2 * Math.cos(2*(s1-s2));
      const a1a = (
        -G*(2*M1+M2)*Math.sin(s1)
        - M2*G*Math.sin(s1-2*s2)
        - 2*sd*M2*(s2v*s2v*L2 + s1v*s1v*L1*cd)
      ) / (L1*den);
      const a2a = (
        2*sd*(s1v*s1v*L1*(M1+M2) + G*(M1+M2)*Math.cos(s1) + s2v*s2v*L2*M2*cd)
      ) / (L2*den);
      return [s1v, a1a, s2v, a2a];
    }

    function stepRK4(dt) {
      const [k1a, k1b, k1c, k1d] = derivatives(a1, a1v, a2, a2v);
      const [k2a, k2b, k2c, k2d] = derivatives(
        a1+k1a*dt/2, a1v+k1b*dt/2, a2+k1c*dt/2, a2v+k1d*dt/2);
      const [k3a, k3b, k3c, k3d] = derivatives(
        a1+k2a*dt/2, a1v+k2b*dt/2, a2+k2c*dt/2, a2v+k2d*dt/2);
      const [k4a, k4b, k4c, k4d] = derivatives(
        a1+k3a*dt, a1v+k3b*dt, a2+k3c*dt, a2v+k3d*dt);
      a1  += (k1a+2*k2a+2*k3a+k4a)*dt/6;
      a1v += (k1b+2*k2b+2*k3b+k4b)*dt/6;
      a2  += (k1c+2*k2c+2*k3c+k4c)*dt/6;
      a2v += (k1d+2*k2d+2*k3d+k4d)*dt/6;
    }

    // ── 클릭 위치 기반 물리 충격 ──────────────────────────────────────────────
    //
    //  원리:
    //   1. 클릭점 → bob2 방향 단위벡터 (nx, ny) = 반발 방향
    //   2. 각 arm의 접선방향 투영으로 Δa1v, Δa2v 계산
    //      ▸ arm 접선 (각도 증가 방향): T = (cos θ, −sin θ)
    //      ▸ Δav = dot(force_dir, T) × magnitude
    //   3. magnitude = BASE / max(dist, MIN_D) → 거리 역비례
    //   4. /L 나눗셈 없음 → 이전 버전의 핵심 버그 수정
    //
    function applyImpulse(mx, my, mul) {
      const { x2, y2 } = getPos();

      const dx   = x2 - mx;
      const dy   = y2 - my;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 1) return;

      // 반발 방향 (클릭 → bob)
      const nx = dx / dist;
      const ny = dy / dist;

      // 거리 역비례 크기 (가까울수록 세게)
      const BASE  = 220;
      const MIN_D = 30;
      const mag   = BASE * mul / Math.max(dist, MIN_D);

      // arm2 접선 투영 → Δa2v
      //   arm2 방향: (sin a2, cos a2)  /  접선: (cos a2, -sin a2)
      //   토크(스크린 y-down 기준): T·F = nx·cos(a2) - ny·sin(a2)
      const da2v =  (nx * Math.cos(a2) - ny * Math.sin(a2)) * mag;

      // arm1 접선 투영 → Δa1v  (bob2 위치 기준 토크, 강도 55%)
      const da1v =  (nx * Math.cos(a1) - ny * Math.sin(a1)) * mag * 0.55;

      a2v += da2v;
      a1v += da1v;

      // 카오스 노이즈 (충전량 비례)
      a1v += p.random(-0.4, 0.4) * mul;
      a2v += p.random(-0.4, 0.4) * mul;
    }

    // ── 시각 이펙트 헬퍼 ─────────────────────────────────────────────────────
    function addRings(x, y, rc, gc, bc, n, ba) {
      for (let i = 0; i < n; i++)
        rings.push({ x, y, rad:5+i*14, alpha:ba-i*38,
                     rc, gc, bc, speed:5+i*2 });
    }

    function spawnParticles(x, y, rc, gc, bc, n, spd) {
      for (let i = 0; i < n; i++) {
        const ang = p.random(p.TWO_PI);
        const s   = p.random(spd * 0.4, spd);
        particles.push({
          x, y,
          vx: Math.cos(ang)*s, vy: Math.sin(ang)*s,
          alpha: p.random(160, 235),
          size:  p.random(1.5, 3.5),
          r: rc, g: gc, b: bc
        });
      }
    }

    // ── 초기화 ───────────────────────────────────────────────────────────────
    function resetPendulum() {
      cx = p.width  / 2;
      cy = p.height / 2 - p.height * 0.05;
      const arm = Math.min(p.width, p.height) * 0.22;
      L1 = arm; L2 = arm * 0.88;

      // G=1200일 때 자연스러운 진폭을 위한 초기 각도·속도
      a1  = p.random(p.PI * 0.5, p.PI * 0.9);
      a2  = p.random(p.PI * 0.4, p.PI * 1.1);
      a1v = p.random(-2.0, 2.0);
      a2v = p.random(-2.0, 2.0);
      trail = [];
    }

    // ── DOM ──────────────────────────────────────────────────────────────────
    const pillTap    = document.getElementById('pill-tap');
    const pillCharge = document.getElementById('pill-charge');
    const chargeWrap = document.getElementById('charge-wrap');
    const chargeFill = document.getElementById('charge-fill');

    function flashTap() {
      pillTap.classList.add('flash-tap');
      setTimeout(() => pillTap.classList.remove('flash-tap'), 350);
    }
    function updateUI() {
      if (mode === 'charging') {
        pillCharge.classList.add('active-charge');
        chargeWrap.style.opacity = '1';
        chargeFill.style.width   = (chargeLevel * 100) + '%';
      } else {
        pillCharge.classList.remove('active-charge');
        chargeWrap.style.opacity = '0';
      }
    }

    // ── setup ────────────────────────────────────────────────────────────────
    p.setup = function() {
      p.createCanvas(p.windowWidth, p.windowHeight);
      p.colorMode(p.RGB, 255, 255, 255, 255);
      resetPendulum();
    };

    // ── draw ─────────────────────────────────────────────────────────────────
    p.draw = function() {
      p.background(...BG, 255);
      colorPhase += 0.008;

      // 충전 중: 타임스케일 낮춰 슬로우다운
      if (mode === 'charging') {
        chargeLevel = Math.min((p.millis() - pressTime) / 3000, 1.0);
        timeScale   = p.lerp(timeScale, 0.10, 0.06);
        soundChargeUpdate(chargeLevel);
      } else {
        timeScale = p.lerp(timeScale, 1.0, 0.07);
      }

      // 물리 적분 (RK4 × SUBSTEPS)
      for (let i = 0; i < SUBSTEPS; i++) {
        stepRK4(DT * timeScale);
      }

      const pos = getPos();
      const ct  = (Math.sin(colorPhase) + 1) / 2;

      // ── 트레일 색·폭 결정 ───────────────────────────────────────────────
      let tr, tg, tb, tw;
      if (mode === 'charging') {
        tr = p.lerp(GOLD[0], 255, chargeLevel);
        tg = p.lerp(GOLD[1],  40, chargeLevel);
        tb = p.lerp(GOLD[2],   0, chargeLevel);
        tw = p.lerp(1.4, 6.5, chargeLevel);
      } else {
        tr = p.lerp(PINK[0], MINT[0], ct);
        tg = p.lerp(PINK[1], MINT[1], ct);
        tb = p.lerp(PINK[2], MINT[2], ct);
        tw = 1.5;
      }

      trail.push({ x:pos.x2, y:pos.y2, alpha:1.0, r:tr, g:tg, b:tb, w:tw });
      if (trail.length > TRAIL_MAX) trail.splice(0, trail.length - TRAIL_MAX);

      // ── 잔상 렌더 ────────────────────────────────────────────────────────
      p.noStroke();
      for (let i = trail.length - 1; i >= 0; i--) {
        const pt = trail[i];
        pt.alpha -= TRAIL_FADE;
        if (pt.alpha <= 0) { trail.splice(i, 1); continue; }
        const a = pt.alpha, w = pt.w;
        p.fill(pt.r, pt.g, pt.b, a * 28);  p.circle(pt.x, pt.y, w * 14);
        p.fill(pt.r, pt.g, pt.b, a * 80);  p.circle(pt.x, pt.y, w * 5.5);
        p.fill(pt.r, pt.g, pt.b, a * 200); p.circle(pt.x, pt.y, w * 1.8);
      }

      // ── 파티클 렌더 ──────────────────────────────────────────────────────
      p.noStroke();
      for (let i = particles.length - 1; i >= 0; i--) {
        const pt = particles[i];
        pt.x += pt.vx; pt.y += pt.vy;
        pt.vx *= 0.88; pt.vy *= 0.88;
        pt.alpha -= 6;
        if (pt.alpha <= 0) { particles.splice(i, 1); continue; }
        p.fill(pt.r, pt.g, pt.b, pt.alpha * 0.45);
        p.circle(pt.x, pt.y, pt.size * 2.8);
        p.fill(pt.r, pt.g, pt.b, pt.alpha);
        p.circle(pt.x, pt.y, pt.size);
      }

      // ── 파동 링 렌더 ─────────────────────────────────────────────────────
      for (let i = rings.length - 1; i >= 0; i--) {
        const rg = rings[i];
        rg.rad   += rg.speed;
        rg.alpha -= 4.5;
        if (rg.alpha <= 0) { rings.splice(i, 1); continue; }
        p.noFill();
        p.stroke(rg.rc, rg.gc, rg.bc, rg.alpha);
        p.strokeWeight(1.4);
        p.circle(rg.x, rg.y, rg.rad * 2);
      }

      // ── 진자 팔 ──────────────────────────────────────────────────────────
      p.stroke(60, 80, 110, 180);
      p.strokeWeight(1.2);
      p.line(cx,      cy,      pos.x1, pos.y1);
      p.line(pos.x1, pos.y1, pos.x2, pos.y2);

      // ── 조인트 ───────────────────────────────────────────────────────────
      p.noStroke();
      p.fill(120, 140, 160, 200); p.circle(cx,      cy,      10);
      p.fill(160, 180, 200, 200); p.circle(pos.x1, pos.y1,   10);

      // ── bob2 ─────────────────────────────────────────────────────────────
      if (mode === 'charging') {
        const gs = 14 + chargeLevel * 44;
        p.fill(255,170,  0, chargeLevel * 55);  p.circle(pos.x2, pos.y2, gs * 3.2);
        p.fill(255,210, 60, chargeLevel * 110); p.circle(pos.x2, pos.y2, gs * 1.5);
        p.fill(255,255,200, 215);               p.circle(pos.x2, pos.y2, gs * 0.5);
      } else {
        const br = p.lerp(PINK[0], MINT[0], ct);
        const bg = p.lerp(PINK[1], MINT[1], ct);
        const bb = p.lerp(PINK[2], MINT[2], ct);
        p.fill(br, bg, bb,  50); p.circle(pos.x2, pos.y2, 38);
        p.fill(br, bg, bb, 120); p.circle(pos.x2, pos.y2, 18);
        p.fill(255,255,255, 220); p.circle(pos.x2, pos.y2,  5);
      }

      updateUI();
    };

    // ── 마우스 ───────────────────────────────────────────────────────────────
    p.mousePressed = function() {
      ensureAudio();
      mode        = 'charging';
      pressTime   = p.millis();
      chargeLevel = 0;
      soundChargeStart();
    };

    p.mouseReleased = function() {
      if (mode !== 'charging') return;

      const held = p.millis() - pressTime;
      const mx = p.mouseX, my = p.mouseY;

      if (held < 260) {
        // ── TAP ─────────────────────────────────────────────────────────────
        applyImpulse(mx, my, 1.0);

        const ct = (Math.sin(colorPhase) + 1) / 2;
        const ir = p.lerp(PINK[0], MINT[0], ct);
        const ig = p.lerp(PINK[1], MINT[1], ct);
        const ib = p.lerp(PINK[2], MINT[2], ct);

        soundTap(880 + p.random(-200, 200));
        addRings(mx, my, ir, ig, ib, 2, 205);
        spawnParticles(mx, my, ir, ig, ib, 12, 5);

        if (chargeOsc) { try { chargeOsc.stop(); } catch(e){} chargeOsc = null; }
        flashTap();

      } else {
        // ── CHARGE RELEASE ───────────────────────────────────────────────────
        //  최대 충전 시 mul = 1.5 + 1.0*5.5 = 7.0 배
        const mul = 1.5 + chargeLevel * 5.5;
        applyImpulse(mx, my, mul);

        soundChargeRelease();
        addRings(mx, my, GOLD[0], GOLD[1], GOLD[2], 6, 225);
        spawnParticles(mx, my, GOLD[0], GOLD[1], GOLD[2],
          Math.floor(12 + chargeLevel * 28), 4 + chargeLevel * 7);
      }

      mode        = 'idle';
      chargeLevel = 0;
    };

    p.windowResized = function() {
      p.resizeCanvas(p.windowWidth, p.windowHeight);
      resetPendulum();
    };

  });
  </script>
</body>
</html>
