<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swing Paint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #00050a; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }

    #ui-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(0,5,10,0.65);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 40px;
      padding: 10px 28px;
      backdrop-filter: blur(10px);
      pointer-events: none;
      user-select: none;
    }
    .pill {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 5px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.22);
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .pill.flash-tap     { color:#ff1493; border-color:#ff1493; box-shadow:0 0 14px #ff149366; }
    .pill.active-charge { color:#ffaa00; border-color:#ffaa00; box-shadow:0 0 14px #ffaa0066; }
    .sep { width:1px; height:14px; background:rgba(255,255,255,0.09); }
    #charge-wrap {
      width:64px; height:3px;
      background:rgba(255,255,255,0.08);
      border-radius:2px; overflow:hidden;
      opacity:0; transition:opacity 0.2s;
    }
    #charge-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg,#ff6600,#ffee00);
      border-radius:2px;
    }
  </style>
</head>
<body>
  <div id="ui-panel">
    <div class="pill" id="pill-tap">TAP</div>
    <div class="sep"></div>
    <div class="pill" id="pill-charge">CHARGE</div>
    <div id="charge-wrap"><div id="charge-fill"></div></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
