<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swing Paint</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #00050a; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }

    /* ── 시계 네온 컬러 사이클 (8색 × 72s) ─────────────────── */
    @keyframes neon-cycle {
      0%     { color: rgba(  0,200,255,0.88); text-shadow: 0 0 8px rgba(  0,200,255,1.0), 0 0 20px rgba(  0,200,255,0.5), 0 0 44px rgba(  0,200,255,0.18); }
      12.5%  { color: rgba(200,  0,255,0.88); text-shadow: 0 0 8px rgba(200,  0,255,1.0), 0 0 20px rgba(200,  0,255,0.5), 0 0 44px rgba(200,  0,255,0.18); }
      25%    { color: rgba(255, 20,147,0.88); text-shadow: 0 0 8px rgba(255, 20,147,1.0), 0 0 20px rgba(255, 20,147,0.5), 0 0 44px rgba(255, 20,147,0.18); }
      37.5%  { color: rgba( 57,255,183,0.88); text-shadow: 0 0 8px rgba( 57,255,183,1.0), 0 0 20px rgba( 57,255,183,0.5), 0 0 44px rgba( 57,255,183,0.18); }
      50%    { color: rgba(255,100,  0,0.88); text-shadow: 0 0 8px rgba(255,100,  0,1.0), 0 0 20px rgba(255,100,  0,0.5), 0 0 44px rgba(255,100,  0,0.18); }
      62.5%  { color: rgba(100,255, 50,0.88); text-shadow: 0 0 8px rgba(100,255, 50,1.0), 0 0 20px rgba(100,255, 50,0.5), 0 0 44px rgba(100,255, 50,0.18); }
      75%    { color: rgba(255, 20, 60,0.88); text-shadow: 0 0 8px rgba(255, 20, 60,1.0), 0 0 20px rgba(255, 20, 60,0.5), 0 0 44px rgba(255, 20, 60,0.18); }
      87.5%  { color: rgba(  0, 80,255,0.88); text-shadow: 0 0 8px rgba(  0, 80,255,1.0), 0 0 20px rgba(  0, 80,255,0.5), 0 0 44px rgba(  0, 80,255,0.18); }
      100%   { color: rgba(  0,200,255,0.88); text-shadow: 0 0 8px rgba(  0,200,255,1.0), 0 0 20px rgba(  0,200,255,0.5), 0 0 44px rgba(  0,200,255,0.18); }
    }
    @keyframes divider-cycle {
      0%     { box-shadow: 0 0 5px rgba(  0,200,255,0.8); }
      12.5%  { box-shadow: 0 0 5px rgba(200,  0,255,0.8); }
      25%    { box-shadow: 0 0 5px rgba(255, 20,147,0.8); }
      37.5%  { box-shadow: 0 0 5px rgba( 57,255,183,0.8); }
      50%    { box-shadow: 0 0 5px rgba(255,100,  0,0.8); }
      62.5%  { box-shadow: 0 0 5px rgba(100,255, 50,0.8); }
      75%    { box-shadow: 0 0 5px rgba(255, 20, 60,0.8); }
      87.5%  { box-shadow: 0 0 5px rgba(  0, 80,255,0.8); }
      100%   { box-shadow: 0 0 5px rgba(  0,200,255,0.8); }
    }

    /* ── 시계 디스플레이 (좌상단 소형) ─────────────────────── */
    #clock-display {
      position: fixed;
      top: 18px;
      left: 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
      z-index: 5;
    }

    #clock-time {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.08em;
      line-height: 1;
      animation: neon-cycle 72s ease-in-out infinite;
    }

    #clock-time .sep {
      display: inline-block;
      animation: blink-sep 1s step-end infinite;
    }
    @keyframes blink-sep {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    #clock-divider {
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
      animation: divider-cycle 72s ease-in-out infinite;
    }

    #clock-date {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.16em;
      opacity: 0.55;
      animation: neon-cycle 72s ease-in-out infinite;
    }

    /* ── 모드 버튼 패널 ──────────────────────────────────────── */
    #mode-panel {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      pointer-events: auto;
      user-select: none;
      z-index: 10;
    }
    .mode-btn {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,5,10,0.55);
      color: rgba(255,255,255,0.30);
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: color 0.18s, border-color 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mode-btn:hover   { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.18); }
    .mode-btn.mode-on { color: #00ddff; border-color: #00ddff; box-shadow: 0 0 12px #00ddff44; }
    /* 버튼 그룹 구분선 */
    .btn-sep {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.12);
      align-self: center;
      margin: 0 1px;
      flex-shrink: 0;
    }

    /* ── 속도 슬라이더 패널 ──────────────────────────────────── */
    #speed-panel {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 11px;
      background: rgba(0,5,10,0.55);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 30px;
      padding: 9px 22px;
      backdrop-filter: blur(10px);
      pointer-events: auto;
      user-select: none;
      z-index: 10;
    }
    .speed-label {
      font-family: 'Courier New', monospace;
      font-size: 8px;
      letter-spacing: 0.10em;
      color: rgba(255,255,255,0.22);
      white-space: nowrap;
    }
    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 130px;
      height: 2px;
      background: rgba(255,255,255,0.10);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      position: relative;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00ddff;
      cursor: pointer;
      box-shadow: 0 0 8px #00ddff99, 0 0 2px #fff;
      transition: box-shadow 0.15s;
    }
    #speed-slider:active::-webkit-slider-thumb {
      box-shadow: 0 0 14px #00ddffcc, 0 0 3px #fff;
    }
    #speed-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      background: #00ddff;
      cursor: pointer;
      box-shadow: 0 0 8px #00ddff99;
    }
    #speed-slider::-moz-range-track {
      height: 2px;
      background: rgba(255,255,255,0.10);
      border-radius: 2px;
    }
    #speed-track-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    #speed-track-wrap::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 7px;
      background: rgba(0, 221, 255, 0.30);
      pointer-events: none;
    }

    /* ── 에너지 바 (화면 최하단) ─────────────────────────────── */
    #energy-wrap {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    #energy-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #0055ff, #00ddff);
      transition: background 0.4s;
    }
    #energy-wrap.low #energy-fill {
      background: linear-gradient(90deg, #ff2200, #ff6600);
      animation: pulse-energy 0.5s ease-in-out infinite alternate;
    }
    @keyframes pulse-energy {
      from { opacity: 0.5; } to { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- 시계 디스플레이 -->
  <div id="clock-display">
    <div id="clock-time">
      <span id="ct-hh">00</span><span class="sep">:</span><span id="ct-mm">00</span><span class="sep">:</span><span id="ct-ss">00</span>
    </div>
    <div id="clock-divider"></div>
    <div id="clock-date">MON&nbsp;&nbsp;2026.01.01</div>
  </div>

  <!-- 모드 버튼: [물리: ENV · MASS] | [시각: MIRROR · GLOW] | [정보: HUD] -->
  <div id="mode-panel">
    <button class="mode-btn" id="btn-env">EARTH</button>
    <button class="mode-btn" id="btn-mass">STANDARD</button>
    <div class="btn-sep"></div>
    <button class="mode-btn" id="btn-mirror">MIRROR</button>
    <button class="mode-btn" id="btn-style">GLOW</button>
    <div class="btn-sep"></div>
    <button class="mode-btn" id="btn-hud">HUD</button>
  </div>

  <!-- 속도 슬라이더 -->
  <div id="speed-panel">
    <span class="speed-label">SLOW</span>
    <div id="speed-track-wrap">
      <input type="range" id="speed-slider" min="0" max="100" value="50" />
    </div>
    <span class="speed-label">FAST</span>
  </div>

  <!-- 에너지 바 -->
  <div id="energy-wrap"><div id="energy-fill"></div></div>

  <script>
    (function () {
      const DAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      const elHH   = document.getElementById('ct-hh');
      const elMM   = document.getElementById('ct-mm');
      const elSS   = document.getElementById('ct-ss');
      const elDate = document.getElementById('clock-date');

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        const now = new Date();
        elHH.textContent = pad(now.getHours());
        elMM.textContent = pad(now.getMinutes());
        elSS.textContent = pad(now.getSeconds());

        const dy = DAYS[now.getDay()];
        const yr = now.getFullYear();
        const mo = pad(now.getMonth() + 1);
        const da = pad(now.getDate());
        elDate.textContent = `${dy}\u00a0\u00a0${yr}.${mo}.${da}`;
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
