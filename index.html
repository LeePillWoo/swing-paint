<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swing Paint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #00050a; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }

    /* ── 하단 메인 패널 ───────────────────────────────────────── */
    #ui-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(0,5,10,0.65);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 40px;
      padding: 10px 28px;
      backdrop-filter: blur(10px);
      pointer-events: none;
      user-select: none;
    }
    .pill {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 5px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.22);
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .pill.flash-tap     { color:#ff1493; border-color:#ff1493; box-shadow:0 0 14px #ff149366; }
    .pill.active-charge { color:#ffaa00; border-color:#ffaa00; box-shadow:0 0 14px #ffaa0066; }
    .sep { width:1px; height:14px; background:rgba(255,255,255,0.09); }
    #charge-wrap {
      width:64px; height:3px;
      background:rgba(255,255,255,0.08);
      border-radius:2px; overflow:hidden;
      opacity:0; transition:opacity 0.2s;
    }
    #charge-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg,#ff6600,#ffee00);
      border-radius:2px;
    }

    /* ── 모드 버튼 패널 ──────────────────────────────────────── */
    #mode-panel {
      position: fixed;
      bottom: 82px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      pointer-events: auto;
      user-select: none;
    }
    .mode-btn {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,5,10,0.55);
      color: rgba(255,255,255,0.30);
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: color 0.18s, border-color 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mode-btn:hover      { color:rgba(255,255,255,0.55); border-color:rgba(255,255,255,0.18); }
    .mode-btn.mode-on    { color:#00ddff; border-color:#00ddff; box-shadow:0 0 12px #00ddff44; }
    .mode-btn.save-flash { color:#ffee00; border-color:#ffee00; box-shadow:0 0 12px #ffee0055; }

    /* ── 에너지 바 (화면 최하단) ─────────────────────────────── */
    #energy-wrap {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    #energy-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #0055ff, #00ddff);
      transition: background 0.4s;
    }
    #energy-wrap.low #energy-fill {
      background: linear-gradient(90deg, #ff2200, #ff6600);
      animation: pulse-energy 0.5s ease-in-out infinite alternate;
    }
    @keyframes pulse-energy {
      from { opacity: 0.5; } to { opacity: 1; }
    }

    /* ── 스코어 (상단 중앙) ─────────────────────────────────── */
    #score-display {
      position: fixed;
      top: 28px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.35em;
      color: rgba(57,255,183,0.75);
      text-shadow: 0 0 14px rgba(57,255,183,0.45);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #score-display.visible { opacity: 1; }
    #score-display.score-pop {
      animation: score-pop 0.25s ease-out;
    }
    @keyframes score-pop {
      0%   { transform: translateX(-50%) scale(1); }
      50%  { transform: translateX(-50%) scale(1.5); color: #fff; }
      100% { transform: translateX(-50%) scale(1); }
    }
  </style>
</head>
<body>
  <!-- 모드 버튼 -->
  <div id="mode-panel">
    <button class="mode-btn" id="btn-mirror">MIRROR</button>
    <button class="mode-btn" id="btn-style">GLOW</button>
    <button class="mode-btn" id="btn-game">GAME</button>
    <button class="mode-btn" id="btn-save">SAVE</button>
  </div>

  <!-- 기존 TAP / CHARGE 패널 -->
  <div id="ui-panel">
    <div class="pill" id="pill-tap">TAP</div>
    <div class="sep"></div>
    <div class="pill" id="pill-charge">CHARGE</div>
    <div id="charge-wrap"><div id="charge-fill"></div></div>
  </div>

  <!-- 에너지 바 -->
  <div id="energy-wrap"><div id="energy-fill"></div></div>

  <!-- 스코어 -->
  <div id="score-display">0 PTS</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
